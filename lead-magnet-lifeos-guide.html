    <h1>&#x1F9E0; The <span>Life OS</span> Quick-Start Guide</h1>
    <p>Build your personal operating system in 4 pillars &#x2014; and run your life on autopilot</p>
  </div>
  <div class="subtitle">"Your brain is for having ideas, not holding them." &#x2014; David Allen</div>

  <div class="os-grid">
    <div class="os-col">
      <!-- PILLAR 1 -->
      <div class="pillar p1">
        <div class="pillar-title"><span class="icon">&#x1F4E5;</span> Pillar 1: Capture System</div>
        <ul class="pillar-steps">
          <li><strong>Choose ONE inbox</strong> &#x2014; Notes app, Notion, or physical notebook. Never more than one.</li>
          <li><strong>Capture in &lt;30 seconds</strong> &#x2014; Any thought, task, idea goes there immediately. No sorting yet.</li>
          <li><strong>Daily inbox-zero</strong> &#x2014; Every evening, process all captured items: Delete, Delegate, Do, Defer.</li>
          <li><strong>Voice capture</strong> &#x2014; Use Siri/Google voice notes for on-the-go captures (driving, shower).</li>
        </ul>
      </div>
      <!-- PILLAR 2 -->
      <div class="pillar p2">
        <div class="pillar-title"><span class="icon">&#x1F4CB;</span> Pillar 2: Task Engine</div>
        <ul class="pillar-steps">
          <li><strong>One master task list</strong> &#x2014; Todoist, Things, TickTick&#x2026; pick ONE, stick with it.</li>
          <li><strong>Weekly review (Sunday)</strong> &#x2014; 20 min. Clear inbox, review projects, plan top-3 for the week.</li>
          <li><strong>MIT method</strong> &#x2014; Each day, define 3 Most Important Tasks. Do those before checking email.</li>
          <li><strong>Tag by context</strong> &#x2014; @home, @office, @errand, @phone. Work on what fits your location.</li>
        </ul>
      </div>
    </div>
    <div class="os-col">
      <!-- PILLAR 3 -->
      <div class="pillar p3">
        <div class="pillar-title"><span class="icon">&#x1F5D3;&#xFE0F;</span> Pillar 3: Calendar & Rhythm</div>
        <ul class="pillar-steps">
          <li><strong>Time-block your week</strong> &#x2014; Deep work (90 min blocks). Meetings (batched). Admin (30 min).</li>
          <li><strong>Theme your days</strong> &#x2014; Monday = planning, Tue-Thu = deep work, Fri = admin/light tasks.</li>
          <li><strong>Buffer time</strong> &#x2014; Block 20% of your calendar as unscheduled buffer. Life happens.</li>
          <li><strong>Energy-awareness</strong> &#x2014; Schedule hard tasks at your peak energy time. Don't fight biology.</li>
        </ul>
      </div>
      <!-- PILLAR 4 -->
      <div class="pillar p4">
        <div class="pillar-title"><span class="icon">&#x1F501;</span> Pillar 4: Review & Improve</div>
        <ul class="pillar-steps">
          <li><strong>Daily 5-min closeout</strong> &#x2014; What got done? What moved? What's tomorrow's MIT?</li>
          <li><strong>Weekly 20-min review</strong> &#x2014; Inbox zero, calendar review, next week's priorities.</li>
          <li><strong>Monthly 1-hr audit</strong> &#x2014; What's working? What drains energy? Kill 1 bad habit.</li>
          <li><strong>Quarterly reset</strong> &#x2014; Goals check, system tune-up, tools audit. Keep what serves you.</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Weekly Rhythm -->
  <div class="weekly-rhythm">
    <h3>&#x1F5D3;&#xFE0F; Sample Weekly Rhythm</h3>
    <div class="rhythm-grid">
      <div class="rhythm-day"><span class="dow">Mon</span><span class="task">Plan week<br>MIT setup</span></div>
      <div class="rhythm-day"><span class="dow">Tue</span><span class="task">Deep work<br>No meetings</span></div>
      <div class="rhythm-day"><span class="dow">Wed</span><span class="task">Deep work<br>+ calls</span></div>
      <div class="rhythm-day"><span class="dow">Thu</span><span class="task">Deep work<br>Create</span></div>
      <div class="rhythm-day"><span class="dow">Fri</span><span class="task">Admin<br>Light tasks</span></div>
      <div class="rhythm-day"><span class="dow">Sat</span><span class="task">Personal<br>No work</span></div>
      <div class="rhythm-day"><span class="dow">Sun</span><span class="task">Review<br>Next week</span></div>
    </div>
  </div>

  <div class="tip-box">
    <span class="icon">&#x26A1;</span>
    <div><strong>The 2-Minute Rule:</strong> If a task takes &#x2264;2 minutes, do it immediately. Don't add it to a list. Lists are for tasks, not micro-actions. This alone will save you 2+ hours per week.</div>
  </div>
