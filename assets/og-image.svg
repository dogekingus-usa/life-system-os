<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-lso" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d2137;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001d3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-lso" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077B6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow-lso" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-lso)"/>
  <rect width="1200" height="630" fill="url(#glow-lso)"/>
  
  <!-- Grid pattern -->
  <rect width="1200" height="630" fill="none" stroke="rgba(0,180,216,0.03)" stroke-width="1" stroke-dasharray="40 40"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="10" height="630" fill="url(#accent-lso)"/>
  
  <!-- Gear icon -->
  <text x="600" y="280" font-family="Arial,sans-serif" font-size="72" text-anchor="middle">&#x2699;&#xFE0F;</text>
  
  <!-- Site name -->
  <text x="600" y="380" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Life System OS</text>
  
  <!-- Tagline -->
  <text x="600" y="430" font-family="Arial,sans-serif" font-size="20" fill="#90e0ef" text-anchor="middle" letter-spacing="1">Build Your Personal Operating System</text>
  
  <!-- Divider -->
  <line x1="500" y1="450" x2="700" y2="450" stroke="#00B4D8" stroke-width="2" opacity="0.4"/>
  
  <!-- URL -->
  <text x="600" y="500" font-family="Arial,sans-serif" font-size="14" fill="#00B4D8" text-anchor="middle" letter-spacing="3" opacity="0.6">LIFESYSTEMOS.COM</text>

  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="30" fill="none" stroke="#00B4D8" stroke-width="1" opacity="0.2"/>
  <rect x="1150" y="580" width="30" height="30" fill="none" stroke="#00B4D8" stroke-width="1" opacity="0.2"/>
</svg>